services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookhouse
      POSTGRES_PASSWORD: bookhouse
      POSTGRES_DB: bookhouse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  queue:
    image: valkey/valkey:8
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bookhouse:bookhouse@db:5432/bookhouse
      QUEUE_URL: redis://queue:6379
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_OIDC_ISSUER: ${AUTH_OIDC_ISSUER}
      AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID}
      AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET}
      AUTH_OIDC_SCOPES: ${AUTH_OIDC_SCOPES:-openid profile email}
      APP_URL: ${APP_URL}
      COVER_CACHE_DIR: /data/covers
    volumes:
      - covers:/data/covers:ro
    depends_on:
      - db
      - queue

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bookhouse:bookhouse@db:5432/bookhouse
      QUEUE_URL: redis://queue:6379
      NODE_ENV: production
      COVER_CACHE_DIR: /data/covers
    volumes:
      - /Volumes/data/media/ebooks:/data/ebooks:ro
      - /Volumes/data/media/audiobooks:/data/audiobooks:ro
      - covers:/data/covers
    depends_on:
      - db
      - queue

volumes:
  pgdata:
  covers:
