services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookhouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookhouse}
      POSTGRES_DB: ${POSTGRES_DB:-bookhouse}
    volumes:
      - pgdata:/var/lib/postgresql/data

  queue:
    image: valkey/valkey:8
    restart: unless-stopped
    volumes:
      - queuedata:/data

  web:
    image: ghcr.io/beforetheshoes/bookhouse-web:${BOOKHOUSE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookhouse}:${POSTGRES_PASSWORD:-bookhouse}@db:5432/${POSTGRES_DB:-bookhouse}
      QUEUE_URL: redis://queue:6379
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_OIDC_ISSUER: ${AUTH_OIDC_ISSUER}
      AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID}
      AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET}
      AUTH_OIDC_SCOPES: ${AUTH_OIDC_SCOPES:-openid profile email}
      APP_URL: ${APP_URL}
      COVER_CACHE_DIR: /data/covers
      KEPUB_CACHE_DIR: /data/kepub-cache
      KOBO_API_BASE_URL: ${KOBO_API_BASE_URL:-http://localhost:3000/kobo}
    volumes:
      - covers:/data/covers:ro
      - kepub-cache:/data/kepub-cache
    depends_on:
      - db
      - queue

  worker:
    image: ghcr.io/beforetheshoes/bookhouse-worker:${BOOKHOUSE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookhouse}:${POSTGRES_PASSWORD:-bookhouse}@db:5432/${POSTGRES_DB:-bookhouse}
      QUEUE_URL: redis://queue:6379
      NODE_ENV: production
      COVER_CACHE_DIR: /data/covers
    volumes:
      - ${EBOOKS_PATH:?set EBOOKS_PATH in .env}:/data/ebooks:ro
      - ${AUDIOBOOKS_PATH:?set AUDIOBOOKS_PATH in .env}:/data/audiobooks:ro
      - covers:/data/covers
    depends_on:
      - db
      - queue

volumes:
  pgdata:
  queuedata:
  covers:
  kepub-cache:
